openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Cooperanth-sim-runner API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: simulations
    description: Simulation management
  - name: runs
    description: Simulation run execution and results
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /simulations/scan:
    post:
      operationId: scanUrl
      tags: [simulations]
      summary: Scan a URL to detect onboarding steps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanUrlBody"
      responses:
        "200":
          description: Detected onboarding steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Invalid URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /simulations/stats:
    get:
      operationId: getSimulationStats
      tags: [simulations]
      summary: Get overall simulation statistics
      responses:
        "200":
          description: Simulation stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationStats"

  /simulations/webhook/{token}:
    post:
      operationId: triggerWebhook
      tags: [simulations]
      summary: Trigger a simulation run via webhook token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Run queued (polling for result via runId)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTriggerResponse"
        "403":
          description: Webhook is disabled for this simulation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /simulations:
    get:
      operationId: listSimulations
      tags: [simulations]
      summary: List all simulations
      responses:
        "200":
          description: List of simulations (webhook token omitted for security)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Simulation"
    post:
      operationId: createSimulation
      tags: [simulations]
      summary: Create a new simulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSimulationBody"
      responses:
        "201":
          description: Created simulation (webhook token omitted; retrieve via GET /simulations/:id)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /simulations/{id}:
    get:
      operationId: getSimulation
      tags: [simulations]
      summary: Get a simulation by ID (includes webhook token)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Simulation with webhook token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSimulation
      tags: [simulations]
      summary: Update a simulation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSimulationBody"
      responses:
        "200":
          description: Updated simulation (webhook token omitted; retrieve via GET /simulations/:id)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Simulation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSimulation
      tags: [simulations]
      summary: Delete a simulation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /simulations/{id}/test-alert:
    post:
      operationId: testAlert
      tags: [simulations]
      summary: Send a test alert to the configured destination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestAlertBody"
      responses:
        "200":
          description: Test alert sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestAlertResponse"
        "400":
          description: No alert destination configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Simulation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to send test alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /simulations/{id}/runs:
    get:
      operationId: listRuns
      tags: [runs]
      summary: List all runs for a simulation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SimulationRun"
    post:
      operationId: createRun
      tags: [runs]
      summary: Start a new simulation run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunBody"
      responses:
        "201":
          description: Run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationRun"
        "404":
          description: Simulation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /simulations/{id}/runs/{runId}:
    get:
      operationId: getRun
      tags: [runs]
      summary: Get a specific run with step results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Run with step results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationRunDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. image/jpeg).

    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. /objects/uploads/uuid). Store this in your database.
        metadata:
          $ref: "#/components/schemas/RequestUploadUrlBody"

    TestAlertBody:
      type: object
      properties:
        destination:
          type: string
          description: "Override destination to test (Slack webhook URL or email). Falls back to the simulation's saved destination if omitted."

    TestAlertResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        destination:
          type: string
        destinationType:
          type: string
          description: "slack or email"
      required:
        - success
        - message
        - destination
        - destinationType

    WebhookTriggerResponse:
      type: object
      properties:
        runId:
          type: integer
        simulationId:
          type: integer
        status:
          type: string
      required:
        - runId
        - simulationId
        - status

    ScanUrlBody:
      type: object
      properties:
        url:
          type: string
        appName:
          type: string
      required:
        - url
        - appName

    DetectedStep:
      type: object
      properties:
        order:
          type: integer
        name:
          type: string
        description:
          type: string
        fields:
          type: array
          items:
            type: string
        stepType:
          type: string
        confidence:
          type: string
          description: "Confidence level: high, medium, or low"
        selector:
          type: string
          description: "Best candidate CSS/text selector for this step's primary element"
        candidateSelectors:
          type: array
          items:
            type: string
          description: "All candidate selectors found for this step"
        actionType:
          type: string
          description: "Suggested action: navigate, click, fill, waitForText, selectOption"
      required:
        - order
        - name
        - description
        - fields
        - stepType
        - confidence
        - selector
        - candidateSelectors
        - actionType

    ScanResult:
      type: object
      properties:
        appName:
          type: string
        url:
          type: string
        detectedSteps:
          type: array
          items:
            $ref: "#/components/schemas/DetectedStep"
        confidence:
          type: string
      required:
        - appName
        - url
        - detectedSteps
        - confidence

    FlowStep:
      type: object
      properties:
        order:
          type: integer
        name:
          type: string
        description:
          type: string
        fields:
          type: array
          items:
            type: string
        stepType:
          type: string
        selector:
          type: string
        actionType:
          type: string
        confidence:
          type: string
        candidateSelectors:
          type: array
          items:
            type: string
      required:
        - order
        - name
        - description
        - fields
        - stepType

    CreateSimulationBody:
      type: object
      properties:
        name:
          type: string
        appName:
          type: string
        appUrl:
          type: string
        appType:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FlowStep"
      required:
        - name
        - appName
        - appUrl
        - appType
        - steps

    UpdateSimulationBody:
      type: object
      properties:
        name:
          type: string
        appName:
          type: string
        appUrl:
          type: string
        appType:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FlowStep"
        schedule:
          type: ["string", "null"]
          description: "Cron expression for scheduled runs (e.g. '0 * * * *' for hourly), or null to disable"
        alertThreshold:
          type: ["integer", "null"]
          description: "Pass rate threshold (0-100) below which an alert is sent, or null to disable"
        alertDestination:
          type: ["string", "null"]
          description: "Slack webhook URL or email address for alerts, or null to disable"
        webhookEnabled:
          type: boolean
          description: "Enable or disable the webhook trigger endpoint"

    CreateRunBody:
      type: object
      properties:
        headedMode:
          type: boolean
          description: "Run in headed mode and record a video"

    Simulation:
      type: object
      description: "Simulation summary returned in list responses. The webhook token is omitted for security."
      properties:
        id:
          type: integer
        name:
          type: string
        appName:
          type: string
        appUrl:
          type: string
        appType:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FlowStep"
        totalRuns:
          type: integer
        lastRunStatus:
          type: ["string", "null"]
        lastRunAt:
          type: ["string", "null"]
        schedule:
          type: ["string", "null"]
        alertThreshold:
          type: ["integer", "null"]
        alertDestination:
          type: ["string", "null"]
        webhookEnabled:
          type: boolean
          description: "Whether the webhook trigger endpoint is active"
        lastAlertedAt:
          type: ["string", "null"]
        lastTestAlertAt:
          type: ["string", "null"]
          description: "ISO 8601 datetime of the last test alert sent, or null if never tested"
        nextRunAt:
          type: ["string", "null"]
          description: "ISO 8601 datetime of the next scheduled run, or null if no schedule"
        recentPassRate:
          type: ["number", "null"]
          description: "Pass rate (0–1) computed from the last 5 completed runs, or null if no runs"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - appName
        - appUrl
        - appType
        - steps
        - totalRuns
        - lastRunStatus
        - lastRunAt
        - schedule
        - alertThreshold
        - alertDestination
        - webhookEnabled
        - lastAlertedAt
        - lastTestAlertAt
        - nextRunAt
        - recentPassRate
        - createdAt
        - updatedAt

    SimulationDetail:
      allOf:
        - $ref: "#/components/schemas/Simulation"
        - type: object
          description: "Full simulation details including the webhook token. Only returned by GET /simulations/:id."
          properties:
            webhookToken:
              type: ["string", "null"]
              description: "Secret webhook token. Keep this confidential — anyone with this token can trigger a run."
          required:
            - webhookToken

    StepResult:
      type: object
      properties:
        stepOrder:
          type: integer
        stepName:
          type: string
        status:
          type: string
        durationMs:
          type: integer
        generatedData:
          type: object
          additionalProperties: true
        errorMessage:
          type: ["string", "null"]
        screenshot:
          type: ["string", "null"]
          description: "Base64-encoded PNG screenshot captured on failure"
        selectorUsed:
          type: ["string", "null"]
          description: "The selector that was used to find the element"
        actionTaken:
          type: ["string", "null"]
          description: "Description of the action performed"
      required:
        - stepOrder
        - stepName
        - status
        - durationMs
        - generatedData
        - errorMessage

    SimulationRun:
      type: object
      properties:
        id:
          type: integer
        simulationId:
          type: integer
        status:
          type: string
        totalSteps:
          type: integer
        passedSteps:
          type: integer
        failedSteps:
          type: integer
        durationMs:
          type: ["integer", "null"]
        headedMode:
          type: boolean
        videoPath:
          type: ["string", "null"]
        startedAt:
          type: string
        completedAt:
          type: ["string", "null"]
      required:
        - id
        - simulationId
        - status
        - totalSteps
        - passedSteps
        - failedSteps
        - durationMs
        - headedMode
        - videoPath
        - startedAt
        - completedAt

    SimulationRunDetail:
      type: object
      properties:
        id:
          type: integer
        simulationId:
          type: integer
        status:
          type: string
        totalSteps:
          type: integer
        passedSteps:
          type: integer
        failedSteps:
          type: integer
        durationMs:
          type: ["integer", "null"]
        headedMode:
          type: boolean
        videoPath:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
          description: "URL to stream the recorded video, or null if no recording exists"
        startedAt:
          type: string
        completedAt:
          type: ["string", "null"]
        stepResults:
          type: array
          items:
            $ref: "#/components/schemas/StepResult"
      required:
        - id
        - simulationId
        - status
        - totalSteps
        - passedSteps
        - failedSteps
        - durationMs
        - headedMode
        - videoPath
        - videoUrl
        - startedAt
        - completedAt
        - stepResults

    SimulationStats:
      type: object
      properties:
        totalSimulations:
          type: integer
        totalRuns:
          type: integer
        passRate:
          type: number
        avgDurationMs:
          type: ["number", "null"]
        recentRuns:
          type: array
          items:
            $ref: "#/components/schemas/SimulationRun"
      required:
        - totalSimulations
        - totalRuns
        - passRate
        - avgDurationMs
        - recentRuns
