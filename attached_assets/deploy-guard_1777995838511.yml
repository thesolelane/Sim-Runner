name: Cooperanth Deploy Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Cooperanth Sim
        run: |
          npm install
          npx playwright install chromium

      - name: Health Check
        run: curl -f https://dev.traydbook.com/healthz || exit 1

      - name: Run Contractor Simulation
        env:
          APP_URL: https://dev.traydbook.com
        run: node run.js traydbook contractor --headed=false

      - name: Run Owner Simulation
        if: success()
        env:
          APP_URL: https://dev.traydbook.com
        run: node run.js traydbook owner --headed=false

      - name: Run Agent Simulation
        if: success()
        env:
          APP_URL: https://dev.traydbook.com
        run: node run.js traydbook agent --headed=false

      - name: Notify on Failure
        if: failure()
        run: |
          echo "🚨 Deploy Guard FAILED"
          echo "Check the logs above for which step broke"
