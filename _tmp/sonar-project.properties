# ─── SonarCloud project configuration ───────────────────────────────────────
# Docs: https://docs.sonarcloud.io/appendices/scanner-parameters/
#
# HOW TO ACTIVATE:
#   1. Go to https://sonarcloud.io and sign in with GitHub
#   2. Import your repo and create a new project
#   3. SonarCloud will give you your organization slug and project key
#   4. Replace the two placeholder values below with your real values
#   5. Add SONAR_TOKEN to your GitHub repo → Settings → Secrets → Actions
#   6. Push to main — the GitHub Action in .github/workflows/sonar.yml fires

sonar.projectKey=YOUR_ORG_YOUR_PROJECT_KEY
sonar.organization=YOUR_SONARCLOUD_ORG_SLUG

sonar.projectName=TraydBook
sonar.projectVersion=1.0

# Source files
sonar.sources=src,server
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Test files (update when tests are added)
sonar.tests=
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage (update if you add Jest/Vitest)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
